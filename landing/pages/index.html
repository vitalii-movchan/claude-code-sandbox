<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лендинги — витрина</title>
  <meta name="description" content="Коллекция одностраничных маркетинговых лендингов: статические сайты на чистых HTML, CSS и vanilla JS." />
  <style>
    :root {
      --bg: #0f1115;
      --surface: #181b22;
      --surface-2: #1f232c;
      --text: #e7e9ee;
      --muted: #9aa1ad;
      --border: #2a2f3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 72px 24px 96px;
    }

    .head { margin-bottom: 48px; }

    .head h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .head p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 17px;
      max-width: 620px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px 24px;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: var(--accent);
    }

    .card:hover {
      transform: translateY(-4px);
      background: var(--surface-2);
      border-color: var(--accent);
    }

    .card__dot {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--accent) 20%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 18px;
    }

    .card h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .card p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      flex: 1;
    }

    .card__go {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }

    .card__go svg { transition: transform 0.15s ease; }
    .card:hover .card__go svg { transform: translateX(3px); }

    .foot {
      margin-top: 56px;
      color: var(--muted);
      font-size: 13px;
    }

    .foot code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="head">
      <h1>Лендинги</h1>
      <p>Коллекция одностраничных маркетинговых лендингов — статические сайты на чистых HTML, CSS и vanilla&nbsp;JS, воспроизводящие макет-референс.</p>
    </header>

    <main class="grid" id="grid"></main>

    <footer class="foot">
      Каждый лендинг самодостаточен и живёт в своей папке. Деплой на Vercel из GitHub Actions на каждый push в <code>main</code>.
    </footer>
  </div>

  <script>
    const LANDINGS = [
      {
        slug: "car_service",
        title: "Car Services",
        accent: "#f15a24",
        icon: "🔧",
        desc: "Сертифицированные автосервисы: 150+ услуг по ремонту с фиксированными ценами и гарантией 12 месяцев."
      },
      {
        slug: "move_service",
        title: "Mover",
        accent: "#1e73e6",
        icon: "📦",
        desc: "Профессиональная компания по переездам с 1980 года: перевозки, «от двери до двери», складское хранение."
      },
      {
        slug: "pet_care",
        title: "Pawsome",
        accent: "#6cc4e0",
        icon: "🐾",
        desc: "Груминг и уход за питомцами: стрижка, гигиена и забота о ваших любимцах."
      },
      {
        slug: "video_alliance",
        title: "Video Alliance",
        accent: "#f5c518",
        icon: "📹",
        desc: "Монтаж видеонаблюдения за 5 дней с гарантией 3 года."
      }
    ];

    const grid = document.getElementById("grid");
    grid.innerHTML = LANDINGS.map(l => `
      <a class="card" style="--accent:${l.accent}" href="${l.slug}/">
        <span class="card__dot">${l.icon}</span>
        <h2>${l.title}</h2>
        <p>${l.desc}</p>
        <span class="card__go">
          Открыть
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </a>
    `).join("");
  </script>
</body>
</html>
